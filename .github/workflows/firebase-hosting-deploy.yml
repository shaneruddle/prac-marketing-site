name: Deploy Marketing Site to Firebase Hosting


on:
  push:
    branches:
      - main
        repository_dispatch:
            types: [cms_publish]


jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'


      - name: Install dependencies
        # TODO: Switch back to npm ci once package-lock.json is regenerated locally
        # after adding firebase-admin. Use: npm install --package-lock-only
        run: npm install


      - name: Build site
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATTAYA_RENT_A_CAR_REBUILD }}
        run: npm run build


      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATTAYA_RENT_A_CAR_REBUILD }}
          projectId: pattaya-rent-a-car-rebuild
          channelId: live

